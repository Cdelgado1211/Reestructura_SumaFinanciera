customHeaders:
  # === 1. Raíz "/" con CSP completo ===
  - pattern: /
    headers:
      - key: Content-Security-Policy
        value: >
          default-src 'self'; base-uri 'self'; object-src 'none';
          frame-ancestors 'none'; connect-src 'self'
            https://3nift3okknzemzfp7y4u57q6ne0lwfnj.lambda-url.us-east-1.on.aws
            https://appserv.danaconnect.com;
          img-src 'self' data: blob:
            https://images.email-platform.com
            https://imgcdn.email-platform.com;
          script-src 'self'; style-src 'self'; font-src 'self' data:;
          worker-src 'self' blob:; manifest-src 'self'; form-action 'self';
          upgrade-insecure-requests

  # === 2. Todas las rutas "/*" con el mismo CSP ===
  - pattern: /*
    headers:
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - key: X-Frame-Options
        value: DENY
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=(),
          accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self)
      - key: Content-Security-Policy
        value: >
          default-src 'self'; base-uri 'self'; object-src 'none';
          frame-ancestors 'none'; connect-src 'self'
            https://3nift3okknzemzfp7y4u57q6ne0lwfnj.lambda-url.us-east-1.on.aws
            https://appserv.danaconnect.com;
          img-src 'self' data: blob:
            https://images.email-platform.com
            https://imgcdn.email-platform.com;
          script-src 'self'; style-src 'self'; font-src 'self' data:;
          worker-src 'self' blob:; manifest-src 'self'; form-action 'self';
          upgrade-insecure-requests

  # === 3. Controles para archivos específicos ===
  - pattern: /index.html
    headers:
      - key: Cache-Control
        value: no-store, no-cache, must-revalidate, max-age=0

  - pattern: /favicon.ico
    headers:
      - key: Content-Security-Policy
        value: default-src 'self'
      - key: X-Content-Type-Options
        value: nosniff

  - pattern: /robots.txt
    headers:
      - key: Content-Security-Policy
        value: default-src 'self'
      - key: X-Content-Type-Options
        value: nosniff

  - pattern: /sitemap.xml
    headers:
      - key: Content-Security-Policy
        value: default-src 'self'
      - key: X-Content-Type-Options
        value: nosniff

  - pattern: /manifest.webmanifest
    headers:
      - key: Content-Security-Policy
        value: default-src 'self'
      - key: X-Content-Type-Options
        value: nosniff

  - pattern: /assets/*.map
    headers:
      - key: Content-Security-Policy
        value: default-src 'self'
      - key: X-Content-Type-Options
        value: nosniff

  - pattern: /assets/*
    headers:
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - key: X-Content-Type-Options
        value: nosniff
      - key: Content-Security-Policy
        value: default-src 'self'
