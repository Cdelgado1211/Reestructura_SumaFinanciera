customHeaders:
  - pattern: '**'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains'
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self)'
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; connect-src 'self' https://3q7hiz2xg7uumknw52olgmks7y0qbowz.lambda-url.us-east-1.on.aws https://appserv.danaconnect.com; img-src 'self' data: blob: https://images.email-platform.com https://imgcdn.email-platform.com; script-src 'self'; style-src 'self'; font-src 'self' data:; worker-src 'self' blob:; manifest-src 'self'; form-action 'self'; media-src 'self' https://images.email-platform.com https://imgcdn.email-platform.com; upgrade-insecure-requests;"

  - pattern: '/api/**'
    headers:
      - key: 'Cache-Control'
        value: 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0'
      - key: 'Pragma'
        value: 'no-cache'
      - key: 'Expires'
        value: '0'
