<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="/anti-iframe.js"></script>
    <title>Página no encontrada | Banistmo</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f2f4f7;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 32px 28px;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.06);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
        font-weight: 700;
        color: #0f172a;
      }

      p {
        margin: 0 0 20px;
        font-size: 16px;
        line-height: 1.6;
        color: #374151;
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #166534;
        background: #ecfdf3;
        border: 1px solid #bbf7d0;
        border-radius: 999px;
        padding: 6px 14px;
        margin-bottom: 16px;
        letter-spacing: 0.5px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        font-weight: 600;
        color: #ffffff;
        background: #005b8f;
        border-radius: 12px;
        padding: 12px 16px;
        transition: background 0.2s ease;
      }

      a:hover,
      a:focus-visible {
        background: #00426a;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status">404</div>
      <h1>La página que buscas no está disponible</h1>
      <p>
        Lo sentimos, la ruta solicitada no existe o ha dejado de estar disponible. Intenta
        volver al inicio para continuar con el flujo de reestructuración.
      </p>
      <a href="/" aria-label="Volver al inicio">Volver al inicio</a>
    </main>
  </body>
</html>
