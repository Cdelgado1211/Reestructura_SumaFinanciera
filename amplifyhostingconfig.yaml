customHeaders:
  - pattern: /
    headers:
      - key: Content-Security-Policy
        value: >
          default-src 'self'; base-uri 'self'; object-src 'none';
          frame-ancestors 'none'; connect-src 'self'
            https://3nift3okknzemzfp7y4u57q6ne0lwfnj.lambda-url.us-east-1.on.aws
            https://appserv.danaconnect.com;
          img-src 'self' data: blob:
            https://images.email-platform.com
            https://imgcdn.email-platform.com;
          script-src 'self'; style-src 'self'; font-src 'self' data:;
          worker-src 'self' blob:; manifest-src 'self';
          form-action 'self'; upgrade-insecure-requests

  - pattern: /*
    headers:
      - key: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - key: X-Frame-Options
        value: DENY
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=(),
          accelerometer=(), gyroscope=(), magnetometer=(), fullscreen=(self)
      - key: Content-Security-Policy
        value: >
          default-src 'self'; base-uri 'self'; object-src 'none';
          frame-ancestors 'none'; connect-src 'self'
            https://3nift3okknzemzfp7y4u57q6ne0lwfnj.lambda-url.us-east-1.on.aws
            https://appserv.danaconnect.com;
          img-src 'self' data: blob:
            https://images.email-platform.com
            https://imgcdn.email-platform.com;
          script-src 'self'; style-src 'self'; font-src 'self' data:;
          worker-src 'self' blob:; manifest-src 'self';
          form-action 'self'; upgrade-insecure-requests
